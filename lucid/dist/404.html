<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LUCID</title>
  <script>
    // Single Page App redirect for GitHub Pages
    // Stores the path and redirects to index.html
    var segmentCount = 1; // number of path segments in the repo name (1 for /ludicqwen/)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
